version: "2"

linters:
  default: none
  enable:
    # correctness
    - govet          # go vet — reports suspicious constructs
    - staticcheck    # comprehensive static analysis
    - errcheck       # checks unchecked errors
    - ineffassign    # detects unused variable assignments

    # security
    - gosec          # inspects source code for security problems

    # style & simplification
    - goconst        # finds repeated strings that could be constants
    - unconvert      # removes unnecessary type conversions
    - unparam        # reports unused function parameters
    - unused         # checks for unused constants, variables, functions, types

    # bugs
    - bodyclose      # checks HTTP response body is closed
    - nilerr         # finds code that returns nil even if error is not nil
    - sqlclosecheck  # checks sql.Rows and sql.Stmt are closed

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # too noisy for existing codebase
        - printf         # causes panic on generator_test with Go 1.25 (golang.org/x/tools bug)
        - inline         # optimization hint only; too noisy with current Go toolchain
    gosec:
      excludes:
        - G104 # unhandled errors — already covered by errcheck
        - G304 # file inclusion via variable — expected in utility/library code
        - G107 # HTTP request with variable URL — expected in utility/library code
        - G301 # directory permissions — acceptable for tmp/dev tooling
        - G501 # blocklisted crypto import — md5 used for non-security hashing (QR filenames)
        - G401 # weak crypto primitive — md5 used for non-security hashing (QR filenames)
        - G404 # weak random — acceptable for non-crypto string generation
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # package comments — too noisy, will add incrementally
        - "-ST1003" # naming conventions (Id→ID, etc.) — changing would break public API
        - "-ST1006" # receiver name 'this' — changing would break public API consumers
        - "-ST1020" # comment format — too noisy for existing codebase
        - "-ST1023" # omit type from declaration — style preference
        - "-SA1019" # deprecated API usage — requires separate migration plan
        - "-SA1029" # built-in type as context key — changing would break public API
        - "-QF1012" # fmt.Sprintf inside WriteString — style/perf micro-optimization

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "go/generator/"
      linters:
        - govet  # causes printf analyzer panic with Go 1.25 (golangci-lint known issue)

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
