name: Auto Tag

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Bump version and create tag
        id: tag
        run: |
          set -euo pipefail

          PREVIOUS_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG="v0.0.0"
          fi

          TAG_COMMIT=$(git rev-list -n 1 "$PREVIOUS_TAG" 2>/dev/null || true)
          CURRENT_COMMIT=$(git rev-parse HEAD)

          if [ "$TAG_COMMIT" == "$CURRENT_COMMIT" ]; then
            echo "No new commits since $PREVIOUS_TAG. Skipping..."
            echo "tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "$PREVIOUS_TAG..HEAD" --format=%B --no-decorate 2>/dev/null || echo "")

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|feat(\(.*\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${PREVIOUS_TAG#v}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $PREVIOUS_TAG → $NEW_TAG ($BUMP)"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Generate Changelog
        if: steps.tag.outputs.tag
        run: |
          PREVIOUS_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          CURRENT_TAG="${{ steps.tag.outputs.tag }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "Initial release" > /tmp/changelog.md
            exit 0
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$CURRENT_TAG"
            echo ""

            echo "### Features"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^feat" || true
            echo ""

            echo "### Bug Fixes"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^fix" || true
            echo ""

            echo "### Documentation"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^docs" || true
            echo ""

            echo "### Tests"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^test" || true
            echo ""

            echo "### Maintenance"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^\(chore\|ci\|refactor\|perf\)" || true
            echo ""

            echo "### Dependencies"
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..$CURRENT_TAG" --no-decorate --grep="^build" || true
          } > /tmp/changelog.md

      - name: Create GitHub Release
        if: steps.tag.outputs.tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: /tmp/changelog.md
